# Ops node compose file for the real three-node deployment (Step 29, see
# docs/deployment.md's "Three-node deployment" section). Runs Prometheus
# and Grafana only. Prometheus's scrape targets for api/ai-inference point
# at the app node's private network address instead of Compose service
# names - see infra/monitoring/prometheus/prometheus.multi-node.example.yml,
# copied and filled in as prometheus.multi-node.yml (git-ignored) on this
# node, mounted below in place of the single-machine prometheus.yml.
# Grafana's own datasource still points at "prometheus:9090" unchanged,
# since Prometheus and Grafana stay on the same node in this deployment.
#
# Copy this file to docker-compose.ops-node.yml (git-ignored) on the ops
# node, alongside a real .env.ops-node (copied from .env.ops-node.example,
# see docs/deployment.md), then run:
#
#   docker compose -f docker-compose.ops-node.yml --env-file .env.ops-node up -d

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.multi-node.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
