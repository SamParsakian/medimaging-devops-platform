services:
  orthanc:
    image: orthancteam/orthanc:latest
    container_name: orthanc
    restart: unless-stopped
    ports:
      - "${ORTHANC_HTTP_PORT:-8042}:8042"
      - "${ORTHANC_DICOM_PORT:-4242}:4242"
    environment:
      ORTHANC_JSON: '{"RegisteredUsers": {"${ORTHANC_USER}": "${ORTHANC_PASSWORD}"}}'
      ORTHANC_USER: ${ORTHANC_USER}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD}
    volumes:
      - orthanc-storage:/var/lib/orthanc/db
      - ./infra/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,urllib.request; r=urllib.request.Request('http://localhost:8042/system'); import base64; r.add_header('Authorization', 'Basic ' + base64.b64encode((os.environ['ORTHANC_USER']+':'+os.environ['ORTHANC_PASSWORD']).encode()).decode()); urllib.request.urlopen(r)"]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  orthanc-storage:
  postgres-data:
  minio-data:
