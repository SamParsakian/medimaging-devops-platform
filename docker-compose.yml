services:
  orthanc:
    image: orthancteam/orthanc:latest
    container_name: orthanc
    restart: unless-stopped
    ports:
      - "${ORTHANC_HTTP_PORT:-8042}:8042"
      - "${ORTHANC_DICOM_PORT:-4242}:4242"
    environment:
      ORTHANC_JSON: '{"RegisteredUsers": {"${ORTHANC_USER}": "${ORTHANC_PASSWORD}"}}'
      ORTHANC_USER: ${ORTHANC_USER}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD}
    volumes:
      - orthanc-storage:/var/lib/orthanc/db
      - ./infra/orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,urllib.request; r=urllib.request.Request('http://localhost:8042/system'); import base64; r.add_header('Authorization', 'Basic ' + base64.b64encode((os.environ['ORTHANC_USER']+':'+os.environ['ORTHANC_PASSWORD']).encode()).decode()); urllib.request.urlopen(r)"]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
    container_name: api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      API_SECRET_KEY: ${API_SECRET_KEY}
      AI_INFERENCE_HOST: ai-inference
      AI_INFERENCE_PORT: 8100
      APP_NODE_HOST: ${APP_NODE_HOST:-localhost}
      DATA_NODE_HOST: ${DATA_NODE_HOST:-localhost}
      OPS_NODE_HOST: ${OPS_NODE_HOST:-localhost}
      API_PORT: ${API_PORT:-8000}
      MINIO_CONSOLE_PORT: ${MINIO_CONSOLE_PORT:-9001}
      ORTHANC_HTTP_PORT: ${ORTHANC_HTTP_PORT:-8042}
      PROMETHEUS_PORT: ${PROMETHEUS_PORT:-9090}
      GRAFANA_PORT: ${GRAFANA_PORT:-3000}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ai-inference:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5

  ai-inference:
    build:
      context: ./services/ai-inference
    container_name: ai-inference
    restart: unless-stopped
    ports:
      - "${AI_INFERENCE_PORT:-8100}:8100"
    environment:
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 30s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - api
      - ai-inference

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  orthanc-storage:
  postgres-data:
  minio-data:
  prometheus-data:
  grafana-data:
