<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MedSyn Lab</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    body {
      background: var(--bg-base);
      min-height: 100vh;
    }

    /* A fixed-aspect-ratio box, matching the source image's own 1672x941
       shape, sized to the viewport's width. The nav is positioned as a
       percentage of *this* box, not the page - so it always lands in the
       same spot on the image itself (below the logo, above the headline)
       no matter how tall or narrow the actual browser window is. A plain
       "cover" background on the body cropped the sides on a tall window,
       cutting off both the headline and the CT machine - caught on a real
       screen and fixed by anchoring everything to the image's own shape
       instead of guessing at viewport-relative percentages. */
    .hero {
      position: relative;
      width: 100%;
      aspect-ratio: 1672 / 941;
      background-image: url("images/medsyn-home-hero.jpg");
      background-size: 100% 100%;
      background-repeat: no-repeat;
    }

    .home-nav {
      position: absolute;
      /* Sits directly under the logo baked into the image (the logo
         itself ends around 11.5% down), the same tight logo-then-nav
         stacking the real sidebar uses on the other three pages - not
         floating further down near the headline text. */
      top: 12.5%;
      left: 6.2%;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .home-nav a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.95rem;
      background: rgba(6, 10, 20, 0.55);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 0.5rem 0.9rem;
      backdrop-filter: blur(6px);
      width: fit-content;
    }

    .home-nav a:hover {
      background: rgba(47, 127, 251, 0.2);
      border-color: rgba(47, 127, 251, 0.5);
    }

    .home-nav .icon {
      width: 1.1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="hero">
    <nav class="home-nav">
      <a href="/dashboard/studies.html" data-page><span class="icon">&#127968;</span> Studies</a>
      <a href="/dashboard/upload.html" data-page><span class="icon">&#9729;</span> Upload</a>
      <a href="/dashboard/review.html" data-page><span class="icon">&#129658;</span> Doctor Review</a>
      <a href="/dashboard/ops.html" data-page><span class="icon">&#9881;</span> Ops Dashboard</a>
    </nav>
  </div>

  <script>
    // Every other dashboard page needs ?api_key=... in its own URL (it's
    // how the page's own JS authenticates its API calls, see theme.css's
    // sibling pages) - a plain href without it would land on a real page
    // that then fails every fetch it makes. Carrying the key forward here
    // is the same idea as withApiKey() on the other three pages, just for
    // whole-page navigation instead of an <img> or <a> built by JS.
    const apiKey = new URLSearchParams(window.location.search).get("api_key") || "";
    if (apiKey) {
      for (const link of document.querySelectorAll("a[data-page]")) {
        link.href += `?api_key=${encodeURIComponent(apiKey)}`;
      }
    }
  </script>
</body>
</html>
