name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Use safe demo env values
        # Every value here is already the "changeme" placeholder from
        # .env.example - nothing real, so no GitHub Secrets are needed.
        run: cp .env.example .env

      - name: Validate docker-compose.yml
        run: docker compose config

      - name: Check shell script syntax
        run: |
          for f in $(find scripts -name "*.sh" | sort); do
            echo "Checking $f"
            bash -n "$f"
          done

      - name: Install Python dependencies
        # Every service has its own venv locally, but CI just needs them
        # all importable in one place to check syntax and run tests.
        run: |
          python -m pip install --upgrade pip
          for req in services/*/requirements.txt; do
            pip install -r "$req"
          done
          pip install pytest

      - name: Python syntax/import checks
        run: python -m compileall services scripts -x '\.venv'

      - name: Run tests
        run: pytest tests/ -v
